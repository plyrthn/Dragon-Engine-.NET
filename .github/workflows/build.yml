name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache cimgui
        id: cache-cimgui
        uses: actions/cache@v4
        with:
          path: deps/dx11-hook/build/x64/Release/cimgui.dll
          key: cimgui-${{ hashFiles('deps/dx11-hook/**') }}

      - name: Build cimgui.dll
        if: steps.cache-cimgui.outputs.cache-hit != 'true'
        run: |
          cd deps/dx11-hook
          mkdir build\x64
          cd build\x64
          cmake -DCMAKE_GENERATOR_PLATFORM=x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded ..\..
          cmake --build . --config Release

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore packages
        run: nuget restore DragonEngine.sln

      - name: Build all configurations
        run: |
          $configs = @(
            "YLAD Release",
            "Gaiden Release",
            "Infinite Wealth Release",
            "Lost Judgment Release",
            "Release"
          )
          $failed = @()
          foreach ($cfg in $configs) {
            Write-Host "Building $cfg..."
            msbuild DragonEngine.sln /p:Configuration="$cfg" /p:Platform=x64 /m
            if ($LASTEXITCODE -ne 0) { $failed += $cfg }
          }
          if ($failed.Count -gt 0) {
            Write-Host "Failed configs: $($failed -join ', ')"
            exit 1
          }
        shell: pwsh

      - name: Zip artifacts
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          $configs = @(
            "YLAD Release",
            "Gaiden Release",
            "Infinite Wealth Release",
            "Lost Judgment Release",
            "Release"
          )
          foreach ($cfg in $configs) {
            $src = "DELibrary.NET/bin/x64/$cfg"
            if (Test-Path $src) {
              Compress-Archive -Path "$src/*" -DestinationPath "staging/$cfg.zip"
            }
          }
          Copy-Item "deps/dx11-hook/build/x64/Release/cimgui.dll" -Destination "staging/cimgui.dll"
          Compress-Archive -Path "staging/cimgui.dll" -DestinationPath "staging/cimgui.zip"
          Remove-Item "staging/cimgui.dll"
        shell: pwsh

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $short = "${{ github.sha }}".Substring(0, 7)
          $tag = "build-$short"
          gh release create $tag --title "Build $short" --prerelease --generate-notes (Get-ChildItem staging/*.zip | ForEach-Object { $_.FullName })
        shell: pwsh
